name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `scripts/run-monitor.ps1`
        2. Trigger file change in ...
        3. Observe log entry ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: PowerShell version, Windows version, module version
      placeholder: |
        - OS: Windows 11 22H2
        - PowerShell: 5.1 / 7.4
        - Module version: 2.0.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste NDJSON lines from `security.log` if applicable (remove any personal information).
      render: json
