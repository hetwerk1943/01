name: Hardening dry-run & redaction tests

on:
  pull_request:
    branches:
      - secure/hardening-safe-alerts
  workflow_dispatch:

jobs:
  dryrun-redaction:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run dry-run / redaction tests
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File tests/dryrun-redaction.ps1
