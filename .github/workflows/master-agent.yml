name: Master Agent Nightly

on:
  schedule:
    - cron: '0 2 * * *'   # codziennie o 2:00 w nocy
  workflow_dispatch:       # możliwość uruchomienia ręcznie

jobs:
  nightly-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VT_API_KEY: ${{ secrets.VT_API_KEY }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run Master Agent Script
        shell: pwsh
        run: |
          ./masterAgent.ps1 -UpdateSponsors
          ./Audit-Project.ps1
          ./masterAgent.ps1 -BackupLogs
          ./masterAgent.ps1 -AutoEnhance
          ./masterAgent.ps1 -MarketAnalysis

      - name: Send Slack Notification
        if: always()
        shell: pwsh
        run: |
          $status = if ($LASTEXITCODE -eq 0) { "✅ Master Agent completed successfully" } else { "⚠️ Master Agent finished with errors" }
          $payload = @{ text = $status } | ConvertTo-Json
          Invoke-RestMethod -Uri $env:SLACK_WEBHOOK -Method Post -Body $payload -ContentType 'application/json'

      - name: Commit automatic changes
        shell: pwsh
        run: |
          git config user.name "GitHub Agent"
          git config user.email "agent@github.com"
          git add .github/FUNDING.yml README.md UltraSecurityMonitor.ps1 dashboard.html
          git commit -m "🤖 Nightly Master Agent updates" || Write-Host "No changes to commit"
          git push origin main
