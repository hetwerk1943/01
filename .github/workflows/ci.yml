name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  powershell-quality:
    name: PowerShell lint & test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer and Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Lint (PSScriptAnalyzer)
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning `
            -ExcludeRule PSAvoidUsingWriteHost `
            -ErrorAction Stop
          if ($results) {
            $results | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Host "✅ PSScriptAnalyzer: no issues found."

      - name: Test (Pester)
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path       = 'tests/powershell'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled    = $true
          $config.TestResult.OutputPath = 'test-results.xml'
          $result = Invoke-Pester -Configuration $config
          if ($result.FailedCount -gt 0) {
            Write-Error "Pester: $($result.FailedCount) test(s) failed."
            exit 1
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: test-results.xml

  web-smoke:
    name: Web smoke checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run web smoke checks
        run: node tools/ci/web-smoke.js
