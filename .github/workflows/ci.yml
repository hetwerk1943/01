name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # ── PowerShell: lint + unit tests (Windows) ───────────────────────────────
  powershell:
    name: PowerShell (lint + Pester)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer + Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop
          Install-Module Pester           -Force -Scope CurrentUser -ErrorAction Stop

      - name: Lint – PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path src -Recurse -Severity Warning
          if ($results) {
            $results | Select-Object ScriptName, Line, Severity, RuleName, Message | Format-Table -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
          }

      - name: Test – Pester
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path          = 'tests/powershell'
          $cfg.Output.Verbosity  = 'Detailed'
          $cfg.TestResult.Enabled    = $true
          $cfg.TestResult.OutputPath = 'test-results.xml'
          $result = Invoke-Pester -Configuration $cfg
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) Pester test(s) failed."
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: test-results.xml

  # ── Web smoke validation (Ubuntu) ─────────────────────────────────────────
  web-smoke:
    name: Web smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run web smoke tests
        run: bash tools/ci/web-smoke.sh
