# This workflow will build a Node.js project and deploy it to an Azure Functions App on Windows or Linux when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure Functions app.
# For instructions see:
#   - https://learn.microsoft.com/en-us/azure/azure-functions/create-first-function-vs-code-node
#   - https://learn.microsoft.com/en-us/azure/azure-functions/create-first-function-vs-code-typescript
#
# To configure this workflow:
# 1. Set up the following secrets in your repository:
#   - AZURE_FUNCTIONAPP_PUBLISH_PROFILE
# 2. Change env variables for your configuration.
#
# For more information on:
#   - GitHub Actions for Azure: https://github.com/Azure/Actions
#   - Azure Functions Action: https://github.com/Azure/functions-action
#   - Publish Profile: https://github.com/Azure/functions-action#using-publish-profile-as-deployment-credential-recommended
#   - Azure Service Principal for RBAC: https://github.com/Azure/functions-action#using-azure-service-principal-for-rbac-as-deployment-credential
#
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples/tree/master/FunctionApp

name: Deploy Node.js project to Azure Function App

permissions:
  contents: read

on:
  push:
    branches: ["main"]

env:
  AZURE_FUNCTIONAPP_NAME: 'your-app-name'       # Zmień na nazwę swojego Function App w Azure
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'           # Ścieżka do projektu (root repozytorium)
  NODE_VERSION: '20.x'                          # Wersja Node.js do użycia

jobs:
  build-and-deploy:
    runs-on: windows-latest                     # Dla Linux użyj ubuntu-latest
    environment: dev
    steps:
    # 1. Checkout repozytorium
    - name: Checkout GitHub Action
      uses: actions/checkout@v4

    # 2. Login do Azure (opcjonalnie zamiast Publish Profile)
    # - name: Login via Azure CLI
    #   uses: azure/login@v1
    #   with:
    #     creds: ${{ secrets.AZURE_RBAC_CREDENTIALS }}

    # 3. Setup Node.js
    - name: Setup Node ${{ env.NODE_VERSION }} Environment
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    # 4. Instalacja zależności, build i testy
    - name: Resolve Project Dependencies Using Npm
      shell: pwsh   # Dla Linux zmień na bash
      run: |
        pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
        npm install
        npm run build --if-present
        npm run test --if-present
        popd

    # 5. Deploy do Azure Functions
    - name: Run Azure Functions Action
      uses: Azure/functions-action@v1
      id: fa
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }} # Usuń jeśli używasz Azure RBAC

    # 6. Status deploy
    - name: Deployment Status
      run: echo "Deployment completed successfully for ${{ env.AZURE_FUNCTIONAPP_NAME }}"
