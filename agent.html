<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra Repo AI Agent + MCP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --card: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #58a6ff;
    --danger: #f85149;
    --warning: #d29922;
    --success: #3fb950;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; margin: 0; padding: 24px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  h2 { font-size: 15px; font-weight: 600; color: var(--accent); margin-bottom: 12px; }
  .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .toolbar input {
    padding: 8px 12px;
    width: 380px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
  }
  button {
    padding: 7px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--accent);
    color: #000;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  button.secondary { background: var(--card); color: var(--text); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
  pre { background: #0d1117; border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; max-height: 320px; overflow-y: auto; color: var(--text); margin-top: 8px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; }
  .badge.high   { background: var(--danger); color: #fff; }
  .badge.medium { background: var(--warning); color: #000; }
  .badge.low    { background: var(--success); color: #000; }
  .mode-label { font-size: 12px; color: var(--muted); }
  footer { text-align: center; color: var(--muted); font-size: 11px; margin-top: 32px; padding-top: 16px; border-top: 1px solid var(--border); }
</style>
</head>
<body>

<h1>🤖 Ultra Repo AI Agent + MCP</h1>

<div class="toolbar">
  <input type="text" id="repoUrl" placeholder="https://github.com/user/repo" />
  <button onclick="loadRepo()">Załaduj repo</button>
  <button class="secondary" onclick="toggleMode()">Zmień tryb agenta</button>
  <span class="mode-label">Tryb: <strong id="modeLabel">calm</strong></span>
</div>

<div class="grid">
  <div class="card">
    <h2>📂 Analiza Repo</h2>
    <button onclick="runAnalysis()">Rozpocznij analizę</button>
    <pre id="analysisOutput">Załaduj repo i kliknij analizę.</pre>
  </div>

  <div class="card">
    <h2>🤖 Decyzja Agenta</h2>
    <pre id="decisionOutput">Uruchom analizę, aby zobaczyć rekomendację.</pre>
  </div>
</div>

<div class="grid">
  <div class="card">
    <h2>📊 AI Confidence Score</h2>
    <canvas id="scoreChart"></canvas>
  </div>

  <div class="card">
    <h2>🗒️ Generator Pull Request</h2>
    <button onclick="showPR()">Generuj Pull Request</button>
    <pre id="prOutput"></pre>
  </div>
</div>

<script>
// =========================
// GLOBAL STATE
// =========================
let repoFiles = [];
let securityIssues = [];
let refactorSuggestions = [];
let history = JSON.parse(localStorage.getItem("agentHistory")) || [];
let scoreHistory = JSON.parse(localStorage.getItem("scoreHistory")) || [];
let agentMode = "calm";
let currentRisk = { level: "LOW", score: 0 };
let scoreChart = null;

// =========================
// MCP CONFIGURATION
// =========================
const MCP_CONFIG = {
  "mcpServers": {
    "sentry": {
      "type": "local",
      "command": "npx",
      "args": ["@sentry/mcp-server@latest", "--host=$SENTRY_HOST"],
      "tools": ["get_issue_details", "get_issue_summary"],
      "env": {
        "SENTRY_HOST": "COPILOT_MCP_SENTRY_HOST",
        "SENTRY_ACCESS_TOKEN": "COPILOT_MCP_SENTRY_ACCESS_TOKEN"
      }
    },
    "notionApi": {
      "type": "local",
      "command": "docker",
      "args": [
        "run", "--rm", "-i", "-e",
        "OPENAPI_MCP_HEADERS={\"Authorization\": \"Bearer $NOTION_API_KEY\", \"Notion-Version\": \"2022-06-28\"}",
        "mcp/notion"
      ],
      "tools": ["*"],
      "env": { "NOTION_API_KEY": "COPILOT_MCP_NOTION_API_KEY" }
    },
    "azure": {
      "type": "local",
      "command": "npx",
      "args": ["-y", "@azure/mcp@latest", "server", "start"],
      "tools": ["*"]
    },
    "cloudflare": {
      "type": "sse",
      "url": "https://docs.mcp.cloudflare.com/sse",
      "tools": ["*"]
    },
    "ado": {
      "type": "local",
      "command": "npx",
      "args": ["-y", "@azure-devops/mcp", "<org>", "-a", "azcli"],
      "tools": ["wit_get_work_item", "wit_get_work_items_batch_by_ids", "pipelines_get", "repos_get"]
    },
    "github-mcp-server": {
      "type": "http",
      "url": "https://api.githubcopilot.com/mcp/readonly",
      "tools": ["*"],
      "headers": { "X-MCP-Toolsets": "repos,issues,users,pull_requests,code_security,secret_protection,actions,web_search" }
    }
  }
};

// =========================
// GITHUB FETCH
// =========================
async function loadRepo() {
  const url = document.getElementById("repoUrl").value.trim();
  const parts = url.replace("https://github.com/", "").split("/");
  const owner = parts[0];
  const repo = parts[1];
  if (!owner || !repo) { alert("Podaj poprawny URL repozytorium GitHub."); return; }
  try {
    const response = await fetch(`https://api.github.com/repos/${encodeURIComponent(owner)}/${encodeURIComponent(repo)}/contents`);
    const data = await response.json();
    if (Array.isArray(data)) {
      repoFiles = data.map(f => f.name);
      securityIssues = [];
      refactorSuggestions = [];
      alert("Repo załadowane \u2705");
    } else {
      alert("Nie udało się pobrać repo (sprawdź URL i uprawnienia).");
    }
  } catch { alert("Błąd połączenia z GitHub API"); }
}

// =========================
// DEEP SCAN
// =========================
function deepRepoScan() {
  const findings = [];
  const required = ['.gitignore', 'package.json', '.eslintrc'];
  required.forEach(f => { if (!repoFiles.includes(f)) findings.push(`Brak pliku: ${f}`); });
  if (!repoFiles.some(f => f.includes('test'))) findings.push("Brak testów");
  if (!repoFiles.includes('Dockerfile')) findings.push("Brak Dockerfile");
  return findings;
}

// =========================
// SECURITY ENGINE
// =========================
function securityRiskEngine() {
  let risk = securityIssues.length * 2;
  if (!repoFiles.includes('.env.example') && !repoFiles.includes('.env.template')) risk += 2;
  if (!repoFiles.includes('.gitignore')) risk += 1;
  if (risk >= 6) return { level: "HIGH", score: risk };
  if (risk >= 3) return { level: "MEDIUM", score: risk };
  return { level: "LOW", score: risk };
}

// =========================
// MATURITY
// =========================
function repoMaturityLevel() {
  let score = 0;
  if (repoFiles.includes('Dockerfile')) score += 2;
  if (repoFiles.some(f => f.includes('test'))) score += 2;
  if (repoFiles.includes('.gitignore')) score += 1;
  if (repoFiles.includes('package.json')) score += 1;
  if (score <= 2) return "PROTOTYPE \uD83D\uDEA7";
  if (score <= 4) return "STARTUP \uD83D\uDE80";
  if (score <= 5) return "GROWTH \uD83D\uDCC8";
  return "ENTERPRISE \uD83C\uDFE2";
}

// =========================
// CONFIDENCE
// =========================
function aiConfidence() {
  const issues = securityIssues.length + deepRepoScan().length;
  return Math.max(100 - issues * 7, 40);
}

// =========================
// ROADMAP
// =========================
function generateDynamicRoadmap() {
  const steps = [];
  if (securityIssues.length > 0) steps.push("Napraw security issues");
  deepRepoScan().forEach(f => steps.push(`Rozwiąż: ${f}`));
  return steps;
}

// =========================
// ANALYSIS
// =========================
function runAnalysis() {
  const out = document.getElementById("analysisOutput");
  let output = "\uD83D\uDCC2 Repo Files:\n";
  repoFiles.forEach(f => output += `- ${f}\n`);

  const findings = deepRepoScan();
  output += "\n\uD83E\uDDE0 Deep Scan:\n";
  if (findings.length === 0) {
    output += "- Brak problemów \u2705\n";
  } else {
    findings.forEach(f => output += `- ${f}\n`);
  }

  currentRisk = securityRiskEngine();
  output += `\n\uD83D\uDD10 Security Risk: ${currentRisk.level} (${currentRisk.score})\n`;
  output += `\n\uD83C\uDFE2 Maturity: ${repoMaturityLevel()}\n`;
  output += `\n\uD83E\uDDE0 AI Confidence: ${aiConfidence()}%\n`;

  const productionReady =
    repoFiles.includes('Dockerfile') &&
    repoFiles.some(f => f.includes('test')) &&
    securityIssues.length === 0;
  output += `\n\uD83D\uDE80 Production Status: ${productionReady ? "READY \u2705" : "NOT READY \u274C"}\n`;

  const roadmap = generateDynamicRoadmap();
  output += "\n\uD83D\uDDFA Roadmap:\n";
  if (roadmap.length === 0) {
    output += "- Brak zadań \uD83C\uDF89\n";
  } else {
    roadmap.forEach((r, i) => { output += `${i + 1}. ${r}\n`; });
  }

  out.textContent = output;
  saveScoreTrend(aiConfidence());
  drawChart();
  runDecisionMaking();
}

// =========================
// DECISION ENGINE
// =========================
function runDecisionMaking() {
  let recommendation;
  if (currentRisk.level === "HIGH") recommendation = "Napraw SECURITY NATYCHMIAST";
  else if (refactorSuggestions.length > 0) recommendation = "Zrób refaktoryzację";
  else recommendation = "Dodaj CI/CD i testy";
  if (agentMode === "aggressive") recommendation = "\u26A0\uFE0F PRIORYTET: " + recommendation.toUpperCase();
  history.push(recommendation);
  localStorage.setItem("agentHistory", JSON.stringify(history));
  document.getElementById("decisionOutput").textContent =
    `\uD83E\uDD16 ${recommendation}\n\n\uD83D\uDCDC Historia:\n` +
    history.slice(-20).map((h, i) => `${i + 1}. ${h}`).join("\n");
}

// =========================
// PR GENERATOR
// =========================
function generatePullRequest() {
  const roadmap = generateDynamicRoadmap();
  let pr = "### \uD83E\uDD16 AI Repo Improvements\n\n";
  if (roadmap.length > 0) {
    roadmap.forEach(s => pr += `- ${s}\n`);
  } else {
    pr += "- Repo is in good shape!\n";
  }
  pr += `\nConfidence: ${aiConfidence()}%`;
  pr += `\nMaturity: ${repoMaturityLevel()}`;
  pr += `\nSecurity Risk: ${currentRisk.level}`;
  return pr;
}
function showPR() {
  const pr = generatePullRequest();
  document.getElementById("prOutput").textContent = pr;
}

// =========================
// MODE
// =========================
function toggleMode() {
  agentMode = agentMode === "calm" ? "aggressive" : "calm";
  document.getElementById("modeLabel").textContent = agentMode;
}

// =========================
// TREND & CHART
// =========================
function saveScoreTrend(score) {
  scoreHistory.push(score);
  if (scoreHistory.length > 50) scoreHistory = scoreHistory.slice(-50);
  localStorage.setItem("scoreHistory", JSON.stringify(scoreHistory));
}

function drawChart() {
  const ctx = document.getElementById('scoreChart');
  if (scoreChart) { scoreChart.destroy(); scoreChart = null; }
  const labels = scoreHistory.map((_, i) => `#${i + 1}`);
  scoreChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'AI Confidence (%)',
        data: scoreHistory,
        backgroundColor: 'rgba(88,166,255,0.7)',
        borderColor: '#58a6ff',
        borderWidth: 1
      }]
    },
    options: {
      responsive: true,
      scales: {
        y: { min: 0, max: 100, ticks: { color: '#8b949e' }, grid: { color: '#30363d' } },
        x: { ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
      },
      plugins: { legend: { labels: { color: '#e6edf3' } } }
    }
  });
}

// Initialize chart from existing history if available
if (scoreHistory.length > 0) drawChart();
</script>

<footer>Ultra Security Monitor – Total Edition &nbsp;|&nbsp; Agent v1.0</footer>
</body>
</html>
