<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lifestyle &amp; Motivation Assessment</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🌱 Lifestyle &amp; Motivation Assessment</h1>
    <p class="subtitle">Discover your dominant motivation style in 5 questions.</p>

    <div id="quiz-section">
      <div id="progress-bar-wrap">
        <div id="progress-bar"></div>
      </div>
      <p id="question-counter"></p>
      <p id="question-text"></p>
      <div id="options"></div>
    </div>

    <div id="result-section" hidden>
      <h2 id="result-title"></h2>
      <p id="result-emoji"></p>
      <p id="result-description"></p>
      <h3>Tips for your lifestyle:</h3>
      <ul id="result-tips"></ul>
      <button id="restartBtn">Take the Quiz Again</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
