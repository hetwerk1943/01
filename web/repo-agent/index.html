<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Ultra Repo AI Agent + MCP – analyze GitHub repositories, detect security risks, and generate improvement roadmaps.">
  <link rel="manifest" href="../../manifest.json">
  <title>Ultra Repo AI Agent + MCP</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.js"
          integrity="sha384-G436+Z2nlA8+PNoeRvWdxKbvOf8E/y+lYxqht2iBwNHTQDV5CJr3+AGVj8fGZi5t"
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🤖 Ultra Repo AI Agent + MCP</h1>

  <!-- Top responsive ad banner -->
  <div class="ad-slot" hidden aria-label="Advertisement" role="complementary">
    <div class="ad-placeholder">📢 Ad Placeholder – AdSense SAFE mode</div>
  </div>

  <div class="section input-section">
    <label for="repoUrl">GitHub Repository URL</label>
    <div class="input-row">
      <input type="text" id="repoUrl" placeholder="https://github.com/user/repo" aria-label="GitHub repository URL">
      <button id="loadRepoBtn">Load Repo</button>
      <button id="modeBtn">Mode: Calm</button>
    </div>
  </div>

  <div class="section">
    <h2>📂 Repo Analysis</h2>
    <pre id="analysisOutput" aria-live="polite">Load a repo and click Analyze.</pre>
    <button id="analyzeBtn">Run Analysis</button>
  </div>

  <div class="section">
    <h2>🤖 Agent Decision</h2>
    <pre id="decisionOutput" aria-live="polite"></pre>
  </div>

  <div class="section">
    <h2>📊 AI Confidence Trend</h2>
    <canvas id="scoreChart" width="400" height="200" aria-label="AI Confidence chart"></canvas>
  </div>

  <div class="section">
    <h2>🚀 Pull Request</h2>
    <button id="prBtn">Generate Pull Request</button>
  </div>

  <!-- Bottom responsive ad banner -->
  <div class="ad-slot" hidden aria-label="Advertisement" role="complementary">
    <div class="ad-placeholder">📢 Ad Placeholder – AdSense SAFE mode</div>
  </div>

  <div style="text-align:right;margin-top:0.5rem;">
    <button id="adsToggleBtn" style="background:#6f42c1;font-size:0.8rem;padding:0.3rem 0.7rem;">Ads: OFF ⛔</button>
  </div>

  <script src="../../ads.js"></script>
  <script src="app.js"></script>
</body>
</html>
