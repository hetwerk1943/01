<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Random Joke Generator – get a random joke with a single click.">
    <link rel="manifest" href="../../manifest.json">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="joke-container">
        <h1>Random Joke Generator</h1>
        <button id="jokeBtn">Get a Joke</button>
        <p id="joke"></p>
        <!-- Bottom responsive ad banner -->
        <div class="ad-slot" hidden aria-label="Advertisement" role="complementary">
          <div class="ad-placeholder">📢 Ad Placeholder – AdSense SAFE mode</div>
        </div>
        <div style="margin-top:0.5rem;">
          <button id="adsToggleBtn" style="background:#6f42c1;font-size:0.75rem;padding:0.3rem 0.6rem;">Ads: OFF ⛔</button>
        </div>
    </div>
    <script src="../../ads.js"></script>
    <script src="app.js"></script>
</body>
</html>
