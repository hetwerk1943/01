name: SaaS App CI

on:
  push:
    paths:
      - 'saas-app/**'
  pull_request:
    paths:
      - 'saas-app/**'

jobs:
  # ---------------------------------------------------------------
  # Backend: lint, build, run migrations on test DB, run tests
  # ---------------------------------------------------------------
  backend:
    name: Backend – Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_test
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas_user -d saas_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: saas-app/server

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://saas_user:saas_pass@localhost:5432/saas_test
      JWT_SECRET: ci_test_jwt_secret_not_for_production
      JWT_EXPIRES_IN: 1h
      RESET_TOKEN_TTL_MINUTES: 60
      CLIENT_ORIGIN: http://localhost:5173
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: ''
      SMTP_PASS: ''
      MAIL_FROM: ci@example.com
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 1000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas-app/server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Build TypeScript
        run: npm run build

      - name: Run tests
        run: npm test

  # ---------------------------------------------------------------
  # Frontend: install and build (type-check via tsc)
  # ---------------------------------------------------------------
  frontend:
    name: Frontend – Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: saas-app/client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: saas-app/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
