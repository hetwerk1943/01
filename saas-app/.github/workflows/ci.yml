name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: saasapp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/saasapp_test
      JWT_SECRET: test-secret
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            database/package-lock.json

      - name: Install database dependencies
        run: cd database && npm install

      - name: Generate Prisma client (database)
        run: cd database && npx prisma generate

      - name: Run database migrations
        run: cd database && npx prisma migrate deploy

      - name: Install server dependencies
        run: cd server && npm install

      - name: Generate Prisma client (server)
        run: cd server && npx prisma generate

      - name: Run tests
        run: cd server && npm test
